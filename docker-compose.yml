# Orquestacion local. Las variables KEYCLOAK_* y REDIS_URL del dashboard se leen
# de un .env en la raiz del repo (docker compose lo carga solo); ese archivo
# nunca se commitea. Ver .env.example para los nombres esperados.

services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: python worker.py
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    command: streamlit run app.py --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - redis
      - keycloak
    environment:
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    volumes:
      - ./data:/app/data

volumes:
  keycloak_data:
